name: Bootstrap

on:
  workflow_dispatch:

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.8"
          enable-cache: true

      - name: Install Task
        uses: go-task/setup-task@v2
        with:
          version: "3.x"

      - name: Install Ansible dependencies
        run: task deps

      - name: Prepare SSH key
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$VPS_SSH_DEPLOY_KEY" > ~/.ssh/home-stack-ci
          chmod 600 ~/.ssh/home-stack-ci
        env:
          VPS_SSH_DEPLOY_KEY: ${{ secrets.VPS_SSH_DEPLOY_KEY }}

      - name: Bootstrap VPS
        run: |
          uv run --frozen --no-dev ansible-playbook \
            ansible/bootstrap.yml \
            --inventory ansible/inventory/prod.yml \
            --private-key ~/.ssh/home-stack-ci \
            --user debian
        env:
          ANSIBLE_HOST_KEY_CHECKING: "false"
          VPS_HOST: ${{ secrets.VPS_HOST }}
