name: Build

on:
  workflow_call:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/**"
      - "ansible/**"
      - "docker/**"
      - "terraform/**"
      - "secrets/**"
      - "traefik/**"
      - "Taskfile.yml"
      - "pyproject.toml"
      - "uv.lock"
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.8"
          enable-cache: true

      - name: Install Task
        uses: go-task/setup-task@v2
        with:
          version: "3.x"

      - name: Install OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: 1.11.6

      - name: Run repo checks
        run: task check
