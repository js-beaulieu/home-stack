name: CI

on:
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.8"
          enable-cache: true

      - name: Install Task
        uses: go-task/setup-task@v2
        with:
          version: "3.x"

      - name: Run checks
        run: task check
