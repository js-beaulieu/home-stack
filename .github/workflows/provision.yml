name: Provision

on:
  workflow_call:
  workflow_dispatch:

jobs:
  provision:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.8"
          enable-cache: true

      - name: Install OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: 1.11.6

      - name: Install age
        run: |
          sudo apt-get update
          sudo apt-get install -y age

      - name: Install sops
        run: |
          curl -fsSL -o /tmp/sops.deb https://github.com/getsops/sops/releases/download/v3.12.2/sops_3.12.2_amd64.deb
          sudo apt-get install -y /tmp/sops.deb

      - name: Decrypt or stage prod secrets
        run: |
          mkdir -p .generated/prod
          if grep -q '^sops:' secrets/prod.sops.yaml; then
            printf '%s\n' "$AGE_PRIVATE_KEY" > "$RUNNER_TEMP/age.key"
            chmod 600 "$RUNNER_TEMP/age.key"
            export SOPS_AGE_KEY_FILE="$RUNNER_TEMP/age.key"
            sops -d secrets/prod.sops.yaml > secrets/prod.dec.yaml
          else
            cp secrets/prod.sops.yaml secrets/prod.dec.yaml
          fi
        env:
          AGE_PRIVATE_KEY: ${{ secrets.AGE_PRIVATE_KEY }}

      - name: Optionally enable B2 remote state
        if: ${{ vars.TOFU_STATE_BUCKET != '' && vars.TOFU_STATE_ENDPOINT != '' && vars.TOFU_STATE_REGION != '' && vars.TOFU_STATE_KEY_PREFIX != '' }}
        run: |
          cat > terraform/backend_override.tf <<'EOF'
          terraform {
            backend "s3" {}
          }
          EOF
          cat > terraform/backend.prod.hcl <<EOF
          bucket                      = "${{ vars.TOFU_STATE_BUCKET }}"
          key                         = "${{ vars.TOFU_STATE_KEY_PREFIX }}/home-stack.tfstate"
          region                      = "${{ vars.TOFU_STATE_REGION }}"
          endpoint                    = "${{ vars.TOFU_STATE_ENDPOINT }}"
          access_key                  = "${{ secrets.B2_ACCESS_KEY_ID }}"
          secret_key                  = "${{ secrets.B2_SECRET_ACCESS_KEY }}"
          skip_credentials_validation = true
          skip_metadata_api_check     = true
          skip_region_validation      = true
          force_path_style            = true
          EOF
          tofu -chdir=terraform init -reconfigure -input=false -backend-config=backend.prod.hcl

      - name: Initialize local backend when remote state is disabled
        if: ${{ !(vars.TOFU_STATE_BUCKET != '' && vars.TOFU_STATE_ENDPOINT != '' && vars.TOFU_STATE_REGION != '' && vars.TOFU_STATE_KEY_PREFIX != '') }}
        run: tofu -chdir=terraform init -input=false

      - name: Render prod runtime env
        run: |
          tofu -chdir=terraform apply -input=false -auto-approve \
            -var-file=envs/prod.tfvars \
            -target=random_password.pg_keycloak_password \
            -target=random_password.oauth2_proxy_client_secret \
            -target=random_password.oauth2_proxy_cookie_secret \
            -target=random_password.local_smoke_user_password \
            -target=local_sensitive_file.runtime_env

      - name: Upload runtime inputs
        uses: actions/upload-artifact@v4
        with:
          name: home-stack-runtime-inputs
          path: |
            .generated/prod/home-stack.env
            secrets/prod.dec.yaml
            terraform/terraform.tfstate
            terraform/terraform.tfstate.backup
          if-no-files-found: error
