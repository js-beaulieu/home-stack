name: Provision

on:
  push:
    branches: [main]

jobs:
  provision:
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.B2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.B2_SECRET_ACCESS_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.8"
          enable-cache: true

      - name: Install OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: 1.11.6

      - name: Install age
        run: |
          sudo apt-get update
          sudo apt-get install -y age

      - name: Install sops
        run: |
          curl -fsSL -o /tmp/sops.deb https://github.com/getsops/sops/releases/download/v3.12.2/sops_3.12.2_amd64.deb
          sudo apt-get install -y /tmp/sops.deb

      - name: Prepare SSH key
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$VPS_SSH_DEPLOY_KEY" > ~/.ssh/home-stack-ci
          chmod 600 ~/.ssh/home-stack-ci
        env:
          VPS_SSH_DEPLOY_KEY: ${{ secrets.VPS_SSH_DEPLOY_KEY }}

      - name: Open PostgreSQL tunnel
        run: |
          ssh -fN \
            -i ~/.ssh/home-stack-ci \
            -o StrictHostKeyChecking=no \
            -o ExitOnForwardFailure=yes \
            -L 15432:127.0.0.1:5432 \
            debian@${VPS_HOST}
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}

      - name: Decrypt prod secrets
        run: |
          mkdir -p .generated/prod
          printf '%s\n' "$AGE_PRIVATE_KEY" > "$RUNNER_TEMP/age.key"
          chmod 600 "$RUNNER_TEMP/age.key"
          export SOPS_AGE_KEY_FILE="$RUNNER_TEMP/age.key"
          sops -d secrets/prod.sops.yaml > secrets/prod.dec.yaml
        env:
          AGE_PRIVATE_KEY: ${{ secrets.AGE_PRIVATE_KEY }}

      - name: Configure B2 remote state
        run: |
          printf 'terraform {\n  backend "s3" {}\n}\n' > terraform/backend_override.tf
          tofu -chdir=terraform init -reconfigure -input=false -backend-config=envs/backend.prod.hcl

      - name: Generate env file
        run: |
          tofu -chdir=terraform apply -input=false -auto-approve \
            -var-file=envs/prod.tfvars \
            -target=random_password.keycloak_bootstrap_admin_password \
            -target=random_password.pg_keycloak_password \
            -target=random_password.oauth2_proxy_client_secret \
            -target=random_password.oauth2_proxy_cookie_secret \
            -target=local_sensitive_file.runtime_env

      - name: Start stack
        run: |
          uv run --frozen --no-dev ansible-playbook \
            ansible/site.yml \
            --inventory ansible/inventory/prod.yml \
            --private-key ~/.ssh/home-stack-ci \
            -e stack_runtime_env_src="$GITHUB_WORKSPACE/.generated/prod/home-stack.env"
        env:
          ANSIBLE_HOST_KEY_CHECKING: "false"
          VPS_HOST: ${{ secrets.VPS_HOST }}

      - name: Open Keycloak tunnel
        run: |
          ssh -fN \
            -i ~/.ssh/home-stack-ci \
            -o StrictHostKeyChecking=no \
            -o ExitOnForwardFailure=yes \
            -L 18080:127.0.0.1:18080 \
            debian@${VPS_HOST}
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}

      - name: Bootstrap Keycloak permanent admin and import into Tofu state
        run: |
          ADMIN_USER_ID=$(uv run --frozen --no-dev python terraform/scripts/bootstrap_keycloak_admin.py \
            --base-url http://127.0.0.1:18080 \
            --bootstrap-username temp-admin \
            --bootstrap-password "$(tofu -chdir=terraform output -raw keycloak_bootstrap_admin_password)" \
            --permanent-username admin \
            --permanent-password "$(awk '/^keycloak_admin_password:/{print $2; exit}' secrets/prod.dec.yaml)" \
            --print-user-id)
          existing=$(tofu -chdir=terraform state list)
          import_if_missing() {
            echo "$existing" | grep -qx "$1" || \
              tofu -chdir=terraform import -var-file=envs/prod.tfvars "$1" "$2"
          }
          import_if_missing keycloak_user.keycloak_admin       "master/$ADMIN_USER_ID"
          import_if_missing keycloak_user_roles.keycloak_admin "master/$ADMIN_USER_ID"

      - name: Import pre-existing Postgres resources
        run: |
          existing=$(tofu -chdir=terraform state list)
          import_if_missing() {
            echo "$existing" | grep -qx "$1" || \
              tofu -chdir=terraform import -var-file=envs/prod.tfvars "$1" "$2"
          }
          import_if_missing postgresql_role.keycloak     keycloak
          import_if_missing postgresql_database.keycloak keycloak

      - name: Apply OpenTofu provisioning
        run: |
          tofu -chdir=terraform apply -input=false -auto-approve \
            -var-file=envs/prod.tfvars

      - name: Deploy to VPS
        run: |
          uv run --frozen --no-dev ansible-playbook \
            ansible/site.yml \
            --inventory ansible/inventory/prod.yml \
            --private-key ~/.ssh/home-stack-ci \
            -e stack_runtime_env_src="$GITHUB_WORKSPACE/.generated/prod/home-stack.env"
        env:
          ANSIBLE_HOST_KEY_CHECKING: "false"
          VPS_HOST: ${{ secrets.VPS_HOST }}
