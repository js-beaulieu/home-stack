name: Provision

on:
  push:
    branches: [main]
    paths:
      - 'ansible/**'
      - 'docker-compose.yml'
      - 'traefik/**'
  workflow_dispatch:

jobs:
  provision:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.8"
          enable-cache: true

      - name: Install Task
        uses: go-task/setup-task@v2
        with:
          version: "3.x"

      - name: Install Ansible dependencies
        run: task deps

      - name: Generate inventory
        run: |
          cat > ansible/inventory.yml <<EOF
          all:
            hosts:
              vps:
                ansible_host: ${{ secrets.VPS_HOST }}
                ansible_user: debian
                ansible_become: true
          EOF

      - name: Prepare SSH key and vault password
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/home-stack-ci
          chmod 600 ~/.ssh/home-stack-ci
          printf '%s\n' "$ANSIBLE_VAULT_PASSWORD" > "$RUNNER_TEMP/ansible-vault-pass"
          chmod 600 "$RUNNER_TEMP/ansible-vault-pass"
        env:
          ANSIBLE_VAULT_PASSWORD: ${{ secrets.ANSIBLE_VAULT_PASSWORD }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}

      - name: Run playbook
        working-directory: ansible
        run: |
          trap 'rm -f "$RUNNER_TEMP/ansible-vault-pass"' EXIT
          uv run --project .. --frozen --no-dev ansible-playbook \
            playbook.yml \
            --inventory inventory.yml \
            --private-key ~/.ssh/home-stack-ci \
            --vault-password-file "$RUNNER_TEMP/ansible-vault-pass"
        env:
          ANSIBLE_HOST_KEY_CHECKING: "false"
