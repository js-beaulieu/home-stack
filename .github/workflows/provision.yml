name: Provision

on:
  push:
    branches: [main]

jobs:
  provision:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.8"
          enable-cache: true

      - name: Install OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: 1.11.6

      - name: Install age
        run: |
          sudo apt-get update
          sudo apt-get install -y age

      - name: Install sops
        run: |
          curl -fsSL -o /tmp/sops.deb https://github.com/getsops/sops/releases/download/v3.12.2/sops_3.12.2_amd64.deb
          sudo apt-get install -y /tmp/sops.deb

      - name: Prepare SSH key
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$VPS_SSH_DEPLOY_KEY" > ~/.ssh/home-stack-ci
          chmod 600 ~/.ssh/home-stack-ci
        env:
          VPS_SSH_DEPLOY_KEY: ${{ secrets.VPS_SSH_DEPLOY_KEY }}

      - name: Open PostgreSQL tunnel
        run: |
          ssh -fN \
            -i ~/.ssh/home-stack-ci \
            -o StrictHostKeyChecking=no \
            -L 15432:127.0.0.1:5432 \
            debian@${VPS_HOST}
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}

      - name: Decrypt prod secrets
        run: |
          mkdir -p .generated/prod
          printf '%s\n' "$AGE_PRIVATE_KEY" > "$RUNNER_TEMP/age.key"
          chmod 600 "$RUNNER_TEMP/age.key"
          export SOPS_AGE_KEY_FILE="$RUNNER_TEMP/age.key"
          sops -d secrets/prod.sops.yaml > secrets/prod.dec.yaml
        env:
          AGE_PRIVATE_KEY: ${{ secrets.AGE_PRIVATE_KEY }}

      - name: Configure B2 remote state
        run: |
          cat > terraform/backend_override.tf <<'EOF'
          terraform {
            backend "s3" {}
          }
          EOF
          cat > terraform/backend.prod.hcl <<EOF
          bucket                      = "${{ vars.TOFU_STATE_BUCKET }}"
          key                         = "${{ vars.TOFU_STATE_KEY_PREFIX }}/home-stack.tfstate"
          region                      = "${{ vars.TOFU_STATE_REGION }}"
          endpoint                    = "${{ vars.TOFU_STATE_ENDPOINT }}"
          access_key                  = "${{ secrets.B2_ACCESS_KEY_ID }}"
          secret_key                  = "${{ secrets.B2_SECRET_ACCESS_KEY }}"
          skip_credentials_validation = true
          skip_metadata_api_check     = true
          skip_region_validation      = true
          force_path_style            = true
          EOF
          tofu -chdir=terraform init -reconfigure -input=false -backend-config=backend.prod.hcl

      - name: Import pre-existing Postgres resources
        run: |
          tofu -chdir=terraform import -var-file=envs/prod.tfvars postgresql_role.keycloak keycloak 2>/dev/null || true
          tofu -chdir=terraform import -var-file=envs/prod.tfvars postgresql_database.keycloak keycloak 2>/dev/null || true

      - name: Apply OpenTofu provisioning
        run: tofu -chdir=terraform apply -input=false -auto-approve -var-file=envs/prod.tfvars

      - name: Deploy to VPS
        run: |
          uv run --frozen --no-dev ansible-playbook \
            ansible/site.yml \
            --inventory ansible/inventory/prod.yml \
            --private-key ~/.ssh/home-stack-ci \
            -e stack_runtime_env_src="$GITHUB_WORKSPACE/.generated/prod/home-stack.env"
        env:
          ANSIBLE_HOST_KEY_CHECKING: "false"
          VPS_HOST: ${{ secrets.VPS_HOST }}
