version: "3"

vars:
  ANSIBLE_DIR: ansible
  YAML_FILES: >-
    .github/workflows
    ansible
    docker-compose.yml
    traefik
    Taskfile.yml
    .yamllint.yml

tasks:
  check:
    desc: format + lint + validate (pre-commit sanity check)
    deps:
      - format
      - lint
      - validate

  install:
    desc: Install project tooling and Git hooks
    cmds:
      - uv sync --frozen --group dev
      - uv run --frozen --group dev lefthook install

  deps:
    desc: Install Python dependencies for Ansible
    cmds:
      - uv sync --frozen --no-dev

  format:
    desc: Check YAML formatting
    cmds:
      - uv run --frozen --group dev yamllint {{.YAML_FILES}}

  lint:
    desc: Run Ansible and YAML lint checks
    cmds:
      - uv run --frozen --group dev yamllint {{.YAML_FILES}}
      - uv run --frozen --group dev ansible-lint {{.ANSIBLE_DIR}}/playbook.yml

  validate:
    desc: Validate Ansible syntax and Docker Compose config
    deps:
      - ansible:syntax
      - compose:config

  ansible:syntax:
    desc: Run Ansible playbook syntax check
    dir: "{{.ANSIBLE_DIR}}"
    cmds:
      - uv run --project .. --frozen --no-dev ansible-playbook --inventory localhost, --syntax-check playbook.yml

  compose:config:
    desc: Validate Docker Compose configuration
    cmds:
      - docker compose -f docker-compose.yml config --quiet
