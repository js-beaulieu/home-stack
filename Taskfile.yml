version: "3"

vars:
  ANSIBLE_DIR: ansible
  YAML_FILES: >-
    .github/workflows
    ansible
    docker-compose.yml
    docker-compose.local.yml
    traefik
    Taskfile.yml
    .yamllint.yml

tasks:
  check:
    desc: format + lint + validate (pre-commit sanity check)
    deps:
      - format
      - lint
      - validate

  install:
    desc: Install project tooling and Git hooks
    cmds:
      - uv sync --frozen --group dev
      - uv run --frozen --group dev lefthook install

  deps:
    desc: Install Python dependencies for Ansible
    cmds:
      - uv sync --frozen --no-dev

  dev:
    desc: Start the local development stack and follow logs
    deps:
      - dev:start
      - dev:logs

  dev:start:
    desc: Start the local HTTP stack and run local provisioning
    cmds:
      - uv run --frozen --no-dev ansible-playbook --inventory localhost, ansible/local.yml

  dev:logs:
    desc: Follow local development stack logs
    cmds:
      - docker compose -f docker-compose.yml -f docker-compose.local.yml logs -f

  dev:stop:
    desc: Stop the local development stack without deleting volumes
    cmds:
      - docker compose -f docker-compose.yml -f docker-compose.local.yml stop

  format:
    desc: Check YAML formatting
    cmds:
      - uv run --frozen --group dev yamllint {{.YAML_FILES}}

  lint:
    desc: Run Ansible and YAML lint checks
    cmds:
      - uv run --frozen --group dev yamllint {{.YAML_FILES}}
      - uv run --frozen --group dev ansible-lint {{.ANSIBLE_DIR}}/playbook.yml {{.ANSIBLE_DIR}}/local.yml

  validate:
    desc: Validate Ansible syntax and Docker Compose config
    deps:
      - ansible:syntax
      - compose:config

  ansible:syntax:
    desc: Run Ansible playbook syntax check
    dir: "{{.ANSIBLE_DIR}}"
    cmds:
      - uv run --project .. --frozen --no-dev ansible-playbook --inventory localhost, --syntax-check playbook.yml
      - uv run --project .. --frozen --no-dev ansible-playbook --inventory localhost, --syntax-check local.yml

  compose:config:
    desc: Validate Docker Compose configuration
    cmds:
      - docker compose -f docker-compose.yml config --quiet
      - docker compose -f docker-compose.yml -f docker-compose.local.yml config --quiet
