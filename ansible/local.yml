- name: Provision local home-stack
  hosts: localhost
  become: false
  gather_facts: false

  vars:
    local_compose_project_dir: "{{ playbook_dir }}/.."
    local_compose_files:
      - docker-compose.yml
      - docker-compose.local.yml
    postgres_service_name: postgres
    pg_admin_database: postgres
    pg_admin_username: home_stack_admin
    pg_admin_password: home-stack-local-postgres
    pg_keycloak_database: keycloak
    pg_keycloak_username: keycloak
    pg_keycloak_password: home-stack-local-keycloak-db
    keycloak_admin_username: admin
    keycloak_admin_password: home-stack-local-keycloak

  tasks:
    - name: Start local home-stack
      community.docker.docker_compose_v2:
        project_src: "{{ local_compose_project_dir }}"
        files: "{{ local_compose_files }}"
        state: present
        remove_orphans: true
      delegate_to: localhost

    - name: Resolve local Postgres container details
      ansible.builtin.include_tasks: tasks/resolve_compose_service.yml
      vars:
        compose_service_name: "{{ postgres_service_name }}"
        compose_service_container_name_fact: local_postgres_container_name
        compose_service_address_fact: local_postgres_address

    - name: Provision local Postgres resources
      ansible.builtin.include_role:
        name: postgres
        apply:
          delegate_to: localhost
      vars:
        postgres_host: "{{ local_postgres_address }}"

    - name: Wait for local home-stack after Postgres provisioning
      community.docker.docker_compose_v2:
        project_src: "{{ local_compose_project_dir }}"
        files: "{{ local_compose_files }}"
        state: present
        remove_orphans: true
        wait: true
      delegate_to: localhost

    - name: Provision local Keycloak admin flow
      ansible.builtin.include_role:
        name: keycloak
        apply:
          delegate_to: localhost
