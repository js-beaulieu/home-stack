- name: Upgrade installed packages
  ansible.builtin.apt:
    upgrade: dist
    update_cache: true
    cache_valid_time: 3600

- name: Preserve hostname through cloud-init
  ansible.builtin.lineinfile:
    path: /etc/cloud/cloud.cfg
    regexp: "^preserve_hostname:"
    line: "preserve_hostname: true"
    create: false
  notify: Reboot for hostname changes

- name: Allow cloud-init to manage /etc/hosts
  ansible.builtin.lineinfile:
    path: /etc/cloud/cloud.cfg
    regexp: "^manage_etc_hosts:"
    line: "manage_etc_hosts: true"
    create: false
  notify: Reboot for hostname changes

- name: Set cloud-init FQDN
  ansible.builtin.lineinfile:
    path: /etc/cloud/cloud.cfg
    regexp: "^fqdn:"
    line: "fqdn: {{ hostname }}"
    create: false
  notify: Reboot for hostname changes

- name: Set runtime hostname
  ansible.builtin.hostname:
    name: "{{ hostname }}"
  notify: Reboot for hostname changes

- name: Persist hostname in /etc/hostname
  ansible.builtin.lineinfile:
    path: /etc/hostname
    regexp: ".*"
    line: "{{ hostname }}"
    create: true
    owner: root
    group: root
    mode: "0644"
  notify: Reboot for hostname changes

- name: Install host security packages
  ansible.builtin.apt:
    name:
      - fail2ban
      - ufw
      - unattended-upgrades
    state: present

- name: Allow SSH through UFW
  community.general.ufw:
    rule: allow
    port: "22"
    proto: tcp

- name: Allow HTTP through UFW
  community.general.ufw:
    rule: allow
    port: "80"
    proto: tcp

- name: Allow HTTPS through UFW
  community.general.ufw:
    rule: allow
    port: "443"
    proto: tcp

- name: Set UFW default incoming policy
  community.general.ufw:
    direction: incoming
    default: deny

- name: Set UFW default outgoing policy
  community.general.ufw:
    direction: outgoing
    default: allow

- name: Enable UFW
  community.general.ufw:
    state: enabled

- name: Configure fail2ban SSH jail
  ansible.builtin.copy:
    dest: /etc/fail2ban/jail.d/sshd.local
    owner: root
    group: root
    mode: "0644"
    content: |
      [sshd]
      enabled = true
      maxretry = 3
      findtime = 300
      bantime = 1800
  notify: Restart fail2ban

- name: Enable unattended security upgrades
  ansible.builtin.copy:
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    owner: root
    group: root
    mode: "0644"
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";

- name: Disable SSH password authentication
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "^#?PasswordAuthentication\\s+"
    line: "PasswordAuthentication no"
    validate: "sshd -t -f %s"
  notify: Restart ssh

- name: Ensure fail2ban is enabled and running
  ansible.builtin.service:
    name: fail2ban
    enabled: true
    state: started
