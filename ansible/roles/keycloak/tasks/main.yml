- name: Resolve Keycloak container details
  ansible.builtin.include_tasks: "{{ role_path }}/../../tasks/resolve_compose_service.yml"
  vars:
    compose_service_name: "{{ keycloak_service_name }}"
    compose_service_container_name_fact: keycloak_container_name
    compose_service_address_fact: keycloak_container_address

- name: Derive Keycloak internal endpoint
  ansible.builtin.set_fact:
    keycloak_internal_base_url: >-
      {{
        keycloak_scheme
        ~ '://'
        ~ keycloak_container_address
        ~ ':'
        ~ keycloak_http_port
      }}

- name: Ensure permanent admin exists and has admin role
  block:
    - name: Ensure permanent admin user is present and enabled
      community.general.keycloak_user:
        auth_keycloak_url: "{{ keycloak_internal_base_url }}"
        auth_realm: "{{ keycloak_admin_realm }}"
        auth_client_id: admin-cli
        auth_username: "{{ keycloak_admin_username }}"
        auth_password: "{{ keycloak_admin_password }}"
        validate_certs: false
        realm: "{{ keycloak_admin_realm }}"
        username: "{{ keycloak_admin_username }}"
        enabled: true
        credentials:
          - type: password
            value: "{{ keycloak_admin_password }}"
            temporary: false
        state: present
      no_log: true

    - name: Ensure permanent admin has full admin realm role
      community.general.keycloak_user_rolemapping:
        auth_keycloak_url: "{{ keycloak_internal_base_url }}"
        auth_realm: "{{ keycloak_admin_realm }}"
        auth_client_id: admin-cli
        auth_username: "{{ keycloak_admin_username }}"
        auth_password: "{{ keycloak_admin_password }}"
        validate_certs: false
        realm: "{{ keycloak_admin_realm }}"
        target_username: "{{ keycloak_admin_username }}"
        roles:
          - name: "{{ keycloak_full_admin_realm_role }}"
        state: present
      no_log: true
  rescue:
    - name: Ensure permanent admin user is present and enabled through bootstrap service account
      community.general.keycloak_user:
        auth_keycloak_url: "{{ keycloak_internal_base_url }}"
        auth_realm: "{{ keycloak_admin_realm }}"
        auth_client_id: bootstrap-admin
        auth_client_secret: bootstrap-admin
        validate_certs: false
        realm: "{{ keycloak_admin_realm }}"
        username: "{{ keycloak_admin_username }}"
        enabled: true
        credentials:
          - type: password
            value: "{{ keycloak_admin_password }}"
            temporary: false
        state: present
      no_log: true

    - name: Ensure permanent admin has full admin realm role through bootstrap service account
      community.general.keycloak_user_rolemapping:
        auth_keycloak_url: "{{ keycloak_internal_base_url }}"
        auth_realm: "{{ keycloak_admin_realm }}"
        auth_client_id: bootstrap-admin
        auth_client_secret: bootstrap-admin
        validate_certs: false
        realm: "{{ keycloak_admin_realm }}"
        target_username: "{{ keycloak_admin_username }}"
        roles:
          - name: "{{ keycloak_full_admin_realm_role }}"
        state: present
      no_log: true

    - name: Remove bootstrap-admin client
      community.general.keycloak_client:
        auth_keycloak_url: "{{ keycloak_internal_base_url }}"
        auth_realm: "{{ keycloak_admin_realm }}"
        auth_client_id: bootstrap-admin
        auth_client_secret: bootstrap-admin
        validate_certs: false
        realm: "{{ keycloak_admin_realm }}"
        client_id: bootstrap-admin
        state: absent
      no_log: true

- name: Ensure home-stack realm baseline exists
  community.general.keycloak_realm:
    auth_keycloak_url: "{{ keycloak_internal_base_url }}"
    auth_realm: "{{ keycloak_admin_realm }}"
    auth_client_id: admin-cli
    auth_username: "{{ keycloak_admin_username }}"
    auth_password: "{{ keycloak_admin_password }}"
    validate_certs: false
    realm: "{{ keycloak_app_realm }}"
    display_name: "{{ keycloak_app_realm_display_name }}"
    enabled: true
    registration_allowed: false
    login_with_email_allowed: true
    duplicate_emails_allowed: false
    reset_password_allowed: true
    remember_me: true
    edit_username_allowed: false
    state: present
  no_log: true

- name: Ensure home-stack realm client scopes stay aligned with gateway token claims
  community.general.keycloak_clientscope_type:
    auth_keycloak_url: "{{ keycloak_internal_base_url }}"
    auth_realm: "{{ keycloak_admin_realm }}"
    auth_client_id: admin-cli
    auth_username: "{{ keycloak_admin_username }}"
    auth_password: "{{ keycloak_admin_password }}"
    validate_certs: false
    realm: "{{ keycloak_app_realm }}"
    default_clientscopes: "{{ keycloak_default_client_scopes }}"
    optional_clientscopes: "{{ keycloak_optional_client_scopes }}"
  no_log: true

- name: Acquire Keycloak admin token for DCR policy sync
  ansible.builtin.uri:
    url: "{{ keycloak_internal_base_url }}/realms/{{ keycloak_admin_realm }}/protocol/openid-connect/token"
    method: POST
    body_format: form-urlencoded
    body:
      grant_type: password
      client_id: admin-cli
      username: "{{ keycloak_admin_username }}"
      password: "{{ keycloak_admin_password }}"
    return_content: true
  register: keycloak_admin_token_response
  no_log: true

- name: Fetch existing Keycloak realm components
  ansible.builtin.uri:
    url: "{{ keycloak_internal_base_url }}/admin/realms/{{ keycloak_app_realm }}/components"
    method: GET
    headers:
      Authorization: "Bearer {{ keycloak_admin_token_response.json.access_token }}"
    return_content: true
  register: keycloak_realm_components_response
  no_log: true

- name: Upsert anonymous DCR policy components
  ansible.builtin.uri:
    url: >-
      {{
        keycloak_internal_base_url
        ~ '/admin/realms/'
        ~ keycloak_app_realm
        ~ (
          '/components/' ~ existing_component.id
          if existing_component.id is defined
          else '/components'
        )
      }}
    method: "{{ 'PUT' if existing_component.id is defined else 'POST' }}"
    headers:
      Authorization: "Bearer {{ keycloak_admin_token_response.json.access_token }}"
    body_format: json
    body:
      id: "{{ existing_component.id | default(omit) }}"
      name: "{{ item.name }}"
      providerId: "{{ item.provider_id }}"
      providerType: "{{ keycloak_client_registration_policy_provider_type }}"
      parentId: "{{ keycloak_realm_components_response.json[0].parentId }}"
      subType: "{{ item.sub_type }}"
      config: "{{ item.config }}"
    status_code:
      - 200
      - 201
      - 204
  vars:
    existing_component: >-
      {{
        (
          keycloak_realm_components_response.json
          | selectattr('providerType', 'equalto', keycloak_client_registration_policy_provider_type)
          | selectattr('providerId', 'equalto', item.provider_id)
          | selectattr('subType', 'equalto', item.sub_type)
          | list
          | first
        ) | default({})
      }}
  loop: "{{ keycloak_dcr_policy_components }}"
