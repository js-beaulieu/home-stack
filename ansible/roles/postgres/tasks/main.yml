- name: Check PostgreSQL Python adapter availability for Ansible modules
  ansible.builtin.command:
    argv:
      - "{{ ansible_python_interpreter | default(ansible_playbook_python) }}"
      - -c
      - import psycopg2
  register: postgres_python_adapter_check
  changed_when: false
  failed_when: false
  when: ansible_connection != "local"

- name: Install PostgreSQL Python adapter for Ansible modules
  ansible.builtin.apt:
    name: python3-psycopg2
    state: present
    update_cache: true
    cache_valid_time: 3600
  when:
    - ansible_connection != "local"
    - postgres_python_adapter_check.rc != 0

- name: Provision Keycloak PostgreSQL role
  community.postgresql.postgresql_user:
    login_host: "{{ postgres_host }}"
    login_port: "{{ postgres_port }}"
    login_user: "{{ pg_admin_username }}"
    login_password: "{{ pg_admin_password }}"
    login_db: "{{ pg_admin_database }}"
    name: "{{ pg_keycloak_username }}"
    password: "{{ pg_keycloak_password }}"
    role_attr_flags: LOGIN
    state: present
  no_log: true

- name: Provision Keycloak PostgreSQL database
  community.postgresql.postgresql_db:
    login_host: "{{ postgres_host }}"
    login_port: "{{ postgres_port }}"
    login_user: "{{ pg_admin_username }}"
    login_password: "{{ pg_admin_password }}"
    maintenance_db: "{{ pg_admin_database }}"
    name: "{{ pg_keycloak_database }}"
    owner: "{{ pg_keycloak_username }}"
    state: present
  no_log: true
