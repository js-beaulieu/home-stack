- name: Resolve Compose container name for {{ compose_service_name }}
  ansible.builtin.command:
    argv:
      - docker
      - ps
      - --filter
      - "label=com.docker.compose.project={{ stack_compose_project_name }}"
      - --filter
      - "label=com.docker.compose.service={{ compose_service_name }}"
      - --format
      - "{{ '{{.Names}}' }}"
  register: compose_service_container_name_result
  changed_when: false

- name: Confirm Compose container was found for {{ compose_service_name }}
  ansible.builtin.assert:
    that:
      - compose_service_container_name_result.stdout_lines | length > 0
    fail_msg: "Could not find running Compose service {{ compose_service_name }}."
  changed_when: false

- name: Inspect Compose container details for {{ compose_service_name }}
  community.docker.docker_container_info:
    name: "{{ compose_service_container_name_result.stdout_lines | first }}"
  register: compose_service_container_info
  changed_when: false

- name: Confirm Compose container is present and running for {{ compose_service_name }}
  ansible.builtin.assert:
    that:
      - compose_service_container_info.exists
      - compose_service_container_info.container.State.Status == "running"
    fail_msg: "{{ compose_service_name }} container is not running."
  changed_when: false

- name: Record Compose container facts for {{ compose_service_name }}
  ansible.builtin.set_fact:
    "{{ compose_service_container_name_fact }}": "{{ compose_service_container_name_result.stdout_lines | first }}"
    "{{ compose_service_address_fact }}": >-
      {{
        (
          compose_service_container_info.container.NetworkSettings.Networks
          | dict2items
          | map(attribute='value.IPAddress')
          | reject('equalto', '')
          | list
          | first
        )
      }}
