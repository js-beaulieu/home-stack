services:
  traefik:
    ports: !override
      - "80:80"
    volumes: !override
      - ./traefik/local/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/dynamic:/etc/traefik/dynamic:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro

  tasks-api:
    labels: !override
      - "traefik.enable=true"
      - "traefik.docker.network=home-stack_public"
      # Auth is intentionally disabled until the Keycloak gateway stage lands.
      - "traefik.http.routers.tasks.rule=Host(`tasks.localhost`) && PathPrefix(`/api`)"
      - "traefik.http.routers.tasks.entrypoints=web"
      - "traefik.http.routers.tasks.middlewares=strip-api-prefix@file"
      # Health check - public, no auth
      - "traefik.http.routers.tasks-public.rule=Host(`tasks.localhost`) && PathPrefix(`/api/health`)"
      - "traefik.http.routers.tasks-public.entrypoints=web"
      - "traefik.http.routers.tasks-public.middlewares=strip-api-prefix@file"
      - "traefik.http.routers.tasks-public.priority=10"

  postgres:
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: home_stack_admin
      POSTGRES_PASSWORD: home-stack-local-postgres
