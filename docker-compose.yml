services:
  traefik:
    image: traefik:v3
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/dynamic:/etc/traefik/dynamic:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - letsencrypt:/letsencrypt
    environment:
      - DOMAIN=${DOMAIN}
      - ZITADEL_JWKS_URL=${ZITADEL_JWKS_URL}
      - TRAEFIK_CERTIFICATESRESOLVERS_LETSENCRYPT_ACME_EMAIL=${ACME_EMAIL}
    networks:
      - public

  auth-api:
    image: ghcr.io/js-beaulieu/auth-api:latest
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    networks:
      - public
    environment:
      - PORT=${AUTH_PORT:-8080}
      - LOG_FORMAT=${LOG_FORMAT:-json}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - ZITADEL_ISSUER=${ZITADEL_ISSUER}
      - ZITADEL_AUTH_URL=${ZITADEL_AUTH_URL}
      - ZITADEL_TOKEN_URL=${ZITADEL_TOKEN_URL}
      - ZITADEL_JWKS_URL=${ZITADEL_JWKS_URL}
      - ZITADEL_MCP_CLIENT_ID=${ZITADEL_MCP_CLIENT_ID}
      - PUBLIC_URL=https://auth.api.${DOMAIN}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.auth.rule=Host(`auth.api.${DOMAIN}`)"
      - "traefik.http.routers.auth.entrypoints=websecure"
      - "traefik.http.routers.auth.tls.certresolver=letsencrypt"

  tasks-api:
    image: ghcr.io/js-beaulieu/tasks-api:latest
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    networks:
      - public
      - internal
    volumes:
      - tasks-db:/data
    environment:
      - DB_PATH=/data/tasks.db
      - PORT=${TASKS_PORT:-8080}
      - LOG_FORMAT=${LOG_FORMAT:-json}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - LOG_DETAILED=${LOG_DETAILED:-false}
    labels:
      - "traefik.enable=true"
      # Protected routes — jwt-auth middleware validates Bearer token and injects identity headers
      - "traefik.http.routers.tasks.rule=Host(`tasks.api.${DOMAIN}`)"
      - "traefik.http.routers.tasks.entrypoints=websecure"
      - "traefik.http.routers.tasks.tls.certresolver=letsencrypt"
      - "traefik.http.routers.tasks.middlewares=jwt-auth@file"
      # Health check — public, no auth
      - "traefik.http.routers.tasks-public.rule=Host(`tasks.api.${DOMAIN}`) && PathPrefix(`/health`)"
      - "traefik.http.routers.tasks-public.entrypoints=websecure"
      - "traefik.http.routers.tasks-public.tls.certresolver=letsencrypt"
      - "traefik.http.routers.tasks-public.priority=10"

  watchtower:
    image: ghcr.io/nicholas-fedor/watchtower:latest
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_POLL_INTERVAL=300
      - WATCHTOWER_CLEANUP=true

networks:
  public:
  internal:
    internal: true  # no outbound internet; service-to-service only

volumes:
  letsencrypt:
  tasks-db:
