services:
  traefik:
    image: traefik:v3
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/dynamic:/etc/traefik/dynamic:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - letsencrypt:/letsencrypt
    environment:
      - DOMAIN=${DOMAIN}
      - TRAEFIK_CERTIFICATESRESOLVERS_LETSENCRYPT_ACME_EMAIL=${ACME_EMAIL}
    networks:
      - public

  tasks-api:
    image: ghcr.io/js-beaulieu/tasks-api:latest
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    networks:
      - public
      - internal
    volumes:
      - tasks-db:/data
    environment:
      - DB_PATH=/data/tasks.db
      - PORT=${TASKS_PORT:-8080}
      - LOG_FORMAT=${LOG_FORMAT:-json}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - LOG_DETAILED=${LOG_DETAILED:-false}
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=home-stack_public"
      # Auth is intentionally disabled until the Keycloak gateway stage lands.
      - "traefik.http.routers.tasks.rule=Host(`tasks.${DOMAIN}`) && PathPrefix(`/api`)"
      - "traefik.http.routers.tasks.entrypoints=websecure"
      - "traefik.http.routers.tasks.tls.certresolver=letsencrypt"
      - "traefik.http.routers.tasks.middlewares=strip-api-prefix@file"
      # Health check — public, no auth
      - "traefik.http.routers.tasks-public.rule=Host(`tasks.${DOMAIN}`) && PathPrefix(`/api/health`)"
      - "traefik.http.routers.tasks-public.entrypoints=websecure"
      - "traefik.http.routers.tasks-public.tls.certresolver=letsencrypt"
      - "traefik.http.routers.tasks-public.middlewares=strip-api-prefix@file"
      - "traefik.http.routers.tasks-public.priority=10"

  postgres:
    image: postgres:18
    restart: unless-stopped
    networks:
      - internal
    volumes:
      - postgres-data:/var/lib/postgresql
    environment:
      POSTGRES_DB: ${PG_ADMIN_DATABASE:-}
      POSTGRES_USER: ${PG_ADMIN_USERNAME:-}
      POSTGRES_PASSWORD: ${PG_ADMIN_PASSWORD:-}
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  keycloak:
    image: quay.io/keycloak/keycloak:26.6.1
    restart: unless-stopped
    command: start
    env_file:
      - path: .env
        required: false
    networks:
      - public
      - internal
    environment:
      KC_DB: postgres
      KC_DB_URL_HOST: postgres
      KC_DB_URL_DATABASE: ${PG_KEYCLOAK_DATABASE:-}
      KC_DB_USERNAME: ${PG_KEYCLOAK_USERNAME:-}
      KC_DB_PASSWORD: ${PG_KEYCLOAK_PASSWORD:-}
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME: https://auth.${DOMAIN:-}
      KC_PROXY_HEADERS: xforwarded
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN_USERNAME:-}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-}
    depends_on:
      postgres:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=home-stack_public"
      - "traefik.http.routers.keycloak-admin.rule=Host(`auth.${DOMAIN:-}`) && PathPrefix(`/admin`)"
      - "traefik.http.routers.keycloak-admin.entrypoints=websecure"
      - "traefik.http.routers.keycloak-admin.tls.certresolver=letsencrypt"
      - "traefik.http.routers.keycloak-admin.middlewares=keycloak-admin-allowlist"
      - "traefik.http.routers.keycloak-admin.priority=100"
      - "traefik.http.middlewares.keycloak-admin-allowlist.ipallowlist.sourcerange=${KEYCLOAK_ADMIN_ALLOWED_IPS:-}"
      - "traefik.http.routers.keycloak.rule=Host(`auth.${DOMAIN:-}`)"
      - "traefik.http.routers.keycloak.entrypoints=websecure"
      - "traefik.http.routers.keycloak.tls.certresolver=letsencrypt"
      - "traefik.http.services.keycloak.loadbalancer.server.port=8080"

  watchtower:
    image: ghcr.io/nicholas-fedor/watchtower:latest
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_POLL_INTERVAL=300
      - WATCHTOWER_CLEANUP=true

networks:
  public:
  internal:
    internal: true  # no outbound internet; service-to-service only

volumes:
  letsencrypt:
  postgres-data:
  tasks-db:
