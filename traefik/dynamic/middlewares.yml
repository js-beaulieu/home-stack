http:
  middlewares:
    jwt-auth:
      plugin:
        jwt:
          jwksUrl: '{{ env "ZITADEL_JWKS_URL" }}'
          headerMap:
            sub: X-User-ID
            email: X-User-Email
            name: X-User-Name
    well-known-redirect:
      redirectRegex:
        regex: ".*"
        replacement: 'https://auth.api.{{ env "DOMAIN" }}/.well-known/oauth-authorization-server'
        permanent: false
