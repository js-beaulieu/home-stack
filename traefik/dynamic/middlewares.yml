http:
  middlewares:
    strip-api-prefix:
      stripPrefix:
        prefixes:
          - /api

    oauth2-forward-auth:
      forwardAuth:
        address: http://oauth2-proxy:4180/oauth2/auth
        trustForwardHeader: true
        authResponseHeaders:
          - X-Auth-Request-User
          - X-Auth-Request-Email
          - X-Auth-Request-Preferred-Username

    oauth2-signin:
      errors:
        status:
          - "401-403"
        service: oauth2-proxy-signin
        query: /oauth2/sign_in?rd={url}

    private-app-health-path:
      replacePath:
        path: /health

    home-stack-api-jwt:
      plugin:
        jwt:
          issuers:
            - issuer: http://auth.localhost/realms/home-stack
              jwks: http://keycloak:8080/realms/home-stack/protocol/openid-connect/certs
          delayPrefetch: 30s
          validMethods:
            - RS256
          headerMap:
            X-User-ID: sub
            X-User-Email: email
            X-User-Name: name
          removeMissingHeaders: true
          forwardToken: false

  services:
    oauth2-proxy-signin:
      loadBalancer:
        servers:
          - url: http://oauth2-proxy:4180
